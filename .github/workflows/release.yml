name: release

# Gated on ci.yml completing successfully on main (issue #10). The
# workflow_run trigger fires when the `ci` workflow finishes on any
# branch; we filter to main + conclusion==success in the job-level
# `if`. This closes the window where a failing `main` push could still
# produce a tagged GitHub Release because ci.yml and release.yml were
# previously triggered independently on the same push.
on:
  workflow_run:
    workflows: [ci]
    types: [completed]
    branches: [main]

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: semantic-release
    runs-on: ubuntu-24.04
    # Run only when the triggering ci.yml run actually passed. Without
    # this guard, workflow_run fires regardless of conclusion.
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          # workflow_run events fire on the CI run, not the original
          # push, so GITHUB_SHA points at the workflow run rather than
          # the commit. Explicitly check out the commit CI verified so
          # semantic-release walks the right history.
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0
          persist-credentials: false

      - uses: cycjimmy/semantic-release-action@b12c8f6015dc215fe37bc154d4ad456dd3833c90 # v6.0.0
        with:
          extra_plugins: |
            conventional-changelog-conventionalcommits@^9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
