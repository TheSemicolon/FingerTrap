name: ci

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  DOTNET_CLI_DO_NOT_USE_MSBUILD_SERVER: "1"
  DOTNET_NOLOGO: "1"
  DOTNET_CLI_TELEMETRY_OPTOUT: "1"

jobs:
  sidecar:
    name: sidecar (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, windows-2025, macos-15]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: src-sidecar
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0"
          cache: true
          cache-dependency-path: src-sidecar/**/*.csproj
      - run: dotnet restore --locked-mode
      - run: dotnet build -c Release --no-restore
      - run: dotnet test --no-build -c Release

  ui:
    name: ui (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, windows-2025, macos-15]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: src-ui
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v5
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: src-ui/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm build

  tauri:
    name: tauri (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            rid: linux-x64
            triple: x86_64-unknown-linux-gnu
            ext: ""
          - os: windows-2025
            rid: win-x64
            triple: x86_64-pc-windows-msvc
            ext: ".exe"
          - os: macos-15
            rid: osx-arm64
            triple: aarch64-apple-darwin
            ext: ""
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0"
          cache: true
          cache-dependency-path: src-sidecar/**/*.csproj
      - name: Stage sidecar binary for Tauri externalBin
        shell: bash
        run: |
          set -euo pipefail
          publish_dir="$RUNNER_TEMP/sidecar-publish"
          dotnet publish src-sidecar/src/FingerTrap.Sidecar/FingerTrap.Sidecar.csproj \
            -c Release \
            -r "${{ matrix.rid }}" \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:DebugType=embedded \
            -o "$publish_dir"
          mkdir -p src-tauri/binaries
          cp "$publish_dir/fingertrap-sidecar${{ matrix.ext }}" \
             "src-tauri/binaries/fingertrap-sidecar-${{ matrix.triple }}${{ matrix.ext }}"
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - run: cargo fmt --check
        working-directory: src-tauri
      - run: cargo clippy --all-targets -- -D warnings
        working-directory: src-tauri
      - run: cargo check --locked
        working-directory: src-tauri

  repo-check:
    name: repo-check
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - run: bash scripts/check.sh

  lint-actions:
    name: lint-actions
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: raven-actions/actionlint@v2
